      <stop offset="0%" stop-color="#f6e2a0"/>
      <stop offset="55%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c7a1f"/>
    </linearGradient>
  </defs>

  <rect x="0.5" y="0.5" width="919" height="535" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect x="0.5" y="0.5" width="919" height="33" rx="10" fill="#161b22"/>
  <rect x="0.5" y="24" width="919" height="10" fill="#161b22"/>
  <circle cx="17" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="35" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="53" cy="17" r="6" fill="#27c93f"/>
  <text x="460" y="21" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b949e">artem@saas-dev — linguaflow/README.md</text>
  <line x1="0" y1="34" x2="920" y2="34" stroke="#30363d"/>
  <rect x="0" y="34" width="6" height="502" fill="url(#goldGrad2)"/>

  <g font-family="monospace" font-size="15">
    <text x="46" y="68"><tspan fill="#6e7681">~$ </tspan><tspan fill="#4ec9b0">cat linguaflow/README.md</tspan></text>
    <line x1="46" y1="80" x2="874" y2="80" stroke="#30363d"/>

    <text x="46" y="108"><tspan fill="#dcdcaa">LinguaFlow</tspan><tspan fill="#6e7681">   —   flagship SaaS · built &amp; shipped solo</tspan></text>

    <text x="46" y="140"><tspan fill="#569cd6">What</tspan><tspan fill="#ce9178">    Multi-tenant SaaS for teachers &amp; independent learners (any subject)</tspan></text>
    <text x="46" y="162"><tspan fill="#569cd6">Who</tspan><tspan fill="#ce9178">     Tutors running groups &amp; 1-on-1, and students studying on their own</tspan></text>
    <text x="46" y="184"><tspan fill="#569cd6">Solves</tspan><tspan fill="#ce9178">  Replaces spreadsheets, chats &amp; manual billing with one workspace —</tspan></text>
    <text x="46" y="206"><tspan fill="#ce9178">        plus an AI tutor so a student can learn a subject without a teacher</tspan></text>

    <line x1="46" y1="224" x2="874" y2="224" stroke="#30363d"/>

    <text x="46" y="252"><tspan fill="#569cd6">Money</tspan><tspan fill="#ce9178">   Paddle subscriptions (merchant-of-record, EU VAT) + tiered plan</tspan></text>
    <text x="46" y="274"><tspan fill="#ce9178">        limits; direct lesson payments to tutors (IBAN / BLIK / PayPal)</tspan></text>

    <text x="46" y="304"><tspan fill="#569cd6">Built</tspan><tspan fill="#ce9178">   groups · lessons · homework · attendance (dual-confirm diary) ·</tspan></text>
    <text x="46" y="326"><tspan fill="#ce9178">        live finance/debt · analytics · materials · in-app notifications ·</tspan></text>
    <text x="46" y="348"><tspan fill="#ce9178">        payment moderation · email verification · support desk</tspan></text>

    <text x="46" y="378"><tspan fill="#569cd6">AI</tspan><tspan fill="#ce9178">      "Learning tracks" — AI-generated roadmap + adaptive tests +</tspan></text>
    <text x="46" y="400"><tspan fill="#ce9178">        spaced-repetition flashcards + per-subtopic mastery (EMA)</tspan></text>

    <line x1="46" y1="418" x2="874" y2="418" stroke="#30363d"/>

    <text x="46" y="446"><tspan fill="#569cd6">Stack</tspan><tspan fill="#ce9178">   Node · Express · PostgreSQL · Sequelize · React · Vite · Tailwind</tspan></text>
    <text x="46" y="468"><tspan fill="#ce9178">        Paddle · Resend · Groq LLM · i18next(7) · JWT · Zod · Vitest · CI</tspan></text>
    <text x="46" y="498"><tspan fill="#569cd6">Scale</tspan><tspan fill="#b5cea8">   3 roles · 22 data models · 26 REST controllers · 40 migrations · 7 UI languages</tspan></text>
  </g>
</svg>
